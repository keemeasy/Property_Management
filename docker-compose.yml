version: '3.1'

services:

  db:
    image: postgres:15
    container_name: odoo_property_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - db_data:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    container_name: odoo_property_app
    depends_on:
      - db
    ports:
      - "8070:8069"
    restart: unless-stopped
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons

volumes:
  db_data:
  odoo_data:
